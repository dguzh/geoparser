  - name: featureCodes
    url: https://download.geonames.org/export/dump/featureCodes_en.txt
    file: featureCodes_en.txt
    kind: tabular
    separator: "\t"
    attributes:
      original:
        - name: code
          type: text
          index: true
        - name: name
          type: text
        - name: description
          type: text
