  - name: admin2Codes
    url: https://download.geonames.org/export/dump/admin2Codes.txt
    file: admin2Codes.txt
    kind: tabular
    separator: "\t"
    attributes:
      original:
        - name: code
          type: text
          index: true
        - name: name
          type: text
        - name: asciiname
          type: text
        - name: geonameid
          type: integer
      derived:
        - name: name_no_parens
          type: text
          expression: "CASE WHEN instr(name, '(') > 0 THEN trim(substr(name, 1, instr(name, '(') - 1)) ELSE name END"
        - name: asciiname_no_parens
          type: text
          expression: "CASE WHEN instr(asciiname, '(') > 0 THEN trim(substr(asciiname, 1, instr(asciiname, '(') - 1)) ELSE asciiname END"
        - name: country_code
          type: text
          expression: "CASE WHEN instr(code, '.') > 0 THEN substr(code, 1, instr(code, '.') - 1) ELSE code END"
        - name: admin1_code
          type: text
          expression: "CASE WHEN instr(code, '.') > 0 AND instr(substr(code, instr(code, '.') + 1), '.') > 0 THEN substr(substr(code, instr(code, '.') + 1), 1, instr(substr(code, instr(code, '.') + 1), '.') - 1) ELSE NULL END"
        - name: admin2_code
          type: text
          expression: "CASE WHEN instr(code, '.') > 0 AND instr(substr(code, instr(code, '.') + 1), '.') > 0 THEN substr(substr(code, instr(code, '.') + 1), instr(substr(code, instr(code, '.') + 1), '.') + 1) ELSE NULL END"
        - name: admin1_code_full
          type: text
          expression: "country_code || '.' || admin1_code"
        - name: alternatenames
          type: text
          expression: "NULL"
        - name: latitude
          type: real
          expression: "NULL"
        - name: longitude
          type: real
          expression: "NULL"
        - name: feature_class
          type: text
          expression: "NULL"
        - name: feature_code
          type: text
          expression: "NULL"
        - name: feature_name
          type: text
          expression: "NULL"
        - name: cc2
          type: text
          expression: "NULL"
        - name: admin3_code
          type: text
          expression: "NULL"
        - name: admin4_code
          type: text
          expression: "NULL"
        - name: population
          type: integer
          expression: "NULL"
        - name: elevation
          type: integer
          expression: "NULL"
        - name: dem
          type: integer
          expression: "NULL"
        - name: timezone
          type: text
          expression: "NULL"
        - name: modification_date
          type: text
          expression: "NULL"
        - name: geometry
          type: geometry
          expression: "NULL"
          srid: 4326
    view:
      select:
        - column: admin2Codes.geonameid
        - column: admin2Codes.name
        - column: admin2Codes.name_no_parens
        - column: admin2Codes.asciiname
        - column: admin2Codes.asciiname_no_parens
        - column: admin2Codes.alternatenames
        - column: admin2Codes.latitude
        - column: admin2Codes.longitude
        - column: admin2Codes.feature_class
        - column: admin2Codes.feature_code
        - column: admin2Codes.feature_name
        - column: admin2Codes.country_code
        - column: countryInfo.Country
          alias: country_name
        - column: admin2Codes.cc2
        - column: admin2Codes.admin1_code
        - column: admin1CodesASCII.name
          alias: admin1_name
        - column: admin2Codes.admin2_code
        - column: admin2Codes.name
          alias: admin2_name
        - column: admin2Codes.admin3_code
        - column: admin2Codes.admin4_code
        - column: admin2Codes.population
        - column: admin2Codes.elevation
        - column: admin2Codes.dem
        - column: admin2Codes.timezone
        - column: admin2Codes.modification_date
        - column: admin2Codes.geometry
      join:
        - method: left join
          condition:
            type: attribute
            predicate: equals
            left:
              column: admin2Codes.country_code
            right:
              column: countryInfo.ISO
        - method: left join
          condition:
            type: attribute
            predicate: equals
            left:
              column: admin2Codes.admin1_code_full
            right:
              column: admin1CodesASCII.code
    features:
      identifier:
        - column: admin2Codes.geonameid
      names:
