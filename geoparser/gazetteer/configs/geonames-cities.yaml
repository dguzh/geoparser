          type: text
          expression: "CASE WHEN instr(code, '.') > 0 THEN substr(code, 1, instr(code, '.') - 1) ELSE code END"
        - name: admin1_code
          type: text
          expression: "CASE WHEN instr(code, '.') > 0 THEN substr(code, instr(code, '.') + 1) ELSE NULL END"
        - name: alternatenames
          type: text
          expression: "NULL"
        - name: latitude
          type: real
          expression: "NULL"
        - name: longitude
          type: real
          expression: "NULL"
        - name: feature_class
          type: text
          expression: "NULL"
        - name: feature_code
          type: text
          expression: "NULL"
        - name: feature_name
          type: text
          expression: "NULL"
        - name: cc2
