        - column: admin1CodesASCII.name
        - column: admin1CodesASCII.name_no_parens
        - column: admin1CodesASCII.asciiname
        - column: admin1CodesASCII.asciiname_no_parens
        - column: admin1CodesASCII.alternatenames
        - column: admin1CodesASCII.latitude
        - column: admin1CodesASCII.longitude
        - column: admin1CodesASCII.feature_class
        - column: admin1CodesASCII.feature_code
        - column: admin1CodesASCII.feature_name
        - column: admin1CodesASCII.country_code
        - column: countryInfo.Country
          alias: country_name
        - column: admin1CodesASCII.cc2
        - column: admin1CodesASCII.admin1_code
        - column: admin1CodesASCII.name
          alias: admin1_name
        - column: admin1CodesASCII.admin2_code
        - column: admin1CodesASCII.admin2_name
        - column: admin1CodesASCII.admin3_code
        - column: admin1CodesASCII.admin4_code
        - column: admin1CodesASCII.population
        - column: admin1CodesASCII.elevation
        - column: admin1CodesASCII.dem
        - column: admin1CodesASCII.timezone
        - column: admin1CodesASCII.modification_date
