          column: STATUS
        - source: swissNAMES3D_PKT
          column: SPRACHCODE
        - source: swissNAMES3D_PKT
          column: NAMEN_TYP
        - source: swissNAMES3D_PKT
          column: NAMENGRUPP
        - source: swissNAMES3D_PKT
          column: geometry
        - source: swissBOUNDARIES3D_HOHEITSGEBIET
          column: NAME
          alias: GEMEINDE_NAME
        - source: swissBOUNDARIES3D_HOHEITSGEBIET
          column: BFS_NUMMER
          alias: GEMEINDE_BFS_NUMMER
        - source: swissBOUNDARIES3D_BEZIRKSGEBIET
          column: NAME
          alias: BEZIRK_NAME
        - source: swissBOUNDARIES3D_BEZIRKSGEBIET
          column: BEZIRKSNUM
          alias: BEZIRKSNUM
        - source: swissBOUNDARIES3D_KANTONSGEBIET
          column: NAME
          alias: KANTON_NAME
        - source: swissBOUNDARIES3D_KANTONSGEBIET
          column: KANTONSNUM
          alias: KANTONSNUM
      join:
        - method: left join
          source: swissBOUNDARIES3D_HOHEITSGEBIET
          condition:
            type: spatial
            predicate: within
            left: swissNAMES3D_PKT.geometry
            right: swissBOUNDARIES3D_HOHEITSGEBIET.geometry
        - method: left join
          source: swissBOUNDARIES3D_BEZIRKSGEBIET
          condition:
            type: attribute
