name: swissnames3d
sources:
  - name: swissNAMES3D_PKT
    url: https://data.geo.admin.ch/ch.swisstopo.swissnames3d/swissnames3d_2024/swissnames3d_2024_2056.shp.zip
    file: swissNAMES3D_PKT.shp
    type: spatial
    attributes:
      original:
        - name: UUID
          type: text
          index: true
        - name: OBJEKTART
          type: text
        - name: OBJEKTKLAS
          type: text
        - name: HOEHE
          type: real
        - name: GEBAEUDENU
          type: integer
        - name: NAME_UUID
          type: text
        - name: NAME
          type: text
        - name: STATUS
          type: text
        - name: SPRACHCODE
          type: text
        - name: NAMEN_TYP
          type: text
        - name: NAMENGRUPP
          type: text
        - name: geometry
          type: geometry
          index: true
          srid: 2056
      derived:
        - name: NAME_NO_PARENS
          type: text
          expression: "CASE WHEN instr(NAME, '(') > 0 THEN trim(substr(NAME, 1, instr(NAME, '(') - 1)) ELSE NAME END"
        - name: NAME_NO_CODE
          type: text
          expression: "CASE WHEN length(NAME) > 3 AND substr(NAME, -3, 1) = ' ' AND substr(NAME, -2, 2) GLOB '[A-Z][A-Z]' THEN trim(substr(NAME, 1, length(NAME) - 3)) ELSE NAME END"
    view:
      select:
        - source: swissNAMES3D_PKT
          column: UUID
        - source: swissNAMES3D_PKT
          column: OBJEKTART
        - source: swissNAMES3D_PKT
