            predicate: equals
            left: swissBOUNDARIES3D_BEZIRKSGEBIET.KANTONSNUM
            right: swissBOUNDARIES3D_KANTONSGEBIET.KANTONSNUM
    features:
      identifier:
        - column: UUID
      names:
        - column: NAME
        - column: NAME_NO_PARENS
