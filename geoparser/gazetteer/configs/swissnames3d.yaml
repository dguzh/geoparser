name: swissnames3d
sources:
  - name: swissNAMES3D_PKT
    url: https://data.geo.admin.ch/ch.swisstopo.swissnames3d/swissnames3d_2024/swissnames3d_2024_2056.shp.zip
    file: swissNAMES3D_PKT.shp
    kind: spatial
    attributes:
      original:
        - name: UUID
          type: text
          index: true
        - name: OBJEKTART
          type: text
        - name: OBJEKTKLAS
          type: text
        - name: HOEHE
          type: real
        - name: GEBAEUDENU
          type: integer
        - name: NAME_UUID
          type: text
        - name: NAME
          type: text
        - name: STATUS
          type: text
        - name: SPRACHCODE
          type: text
        - name: NAMEN_TYP
          type: text
        - name: NAMENGRUPP
          type: text
        - name: geometry
          type: geometry
          index: true
          srid: 2056
      derived:
        - name: NAME_NO_PARENS
          type: text
          expression: "CASE WHEN instr(NAME, '(') > 0 THEN trim(substr(NAME, 1, instr(NAME, '(') - 1)) ELSE NAME END"
        - name: NAME_NO_CODE
          type: text
          expression: "CASE WHEN length(NAME) > 3 AND substr(NAME, -3, 1) = ' ' AND substr(NAME, -2, 2) GLOB '[A-Z][A-Z]' THEN trim(substr(NAME, 1, length(NAME) - 3)) ELSE NAME END"
    view:
      select:
        - column: swissNAMES3D_PKT.UUID
        - column: swissNAMES3D_PKT.OBJEKTART
        - column: swissNAMES3D_PKT.OBJEKTKLAS
        - column: swissNAMES3D_PKT.HOEHE
        - column: swissNAMES3D_PKT.GEBAEUDENU
        - column: swissNAMES3D_PKT.NAME_UUID
        - column: swissNAMES3D_PKT.NAME
        - column: swissNAMES3D_PKT.NAME_NO_PARENS
        - column: swissNAMES3D_PKT.NAME_NO_CODE
        - column: swissNAMES3D_PKT.STATUS
        - column: swissNAMES3D_PKT.SPRACHCODE
        - column: swissNAMES3D_PKT.NAMEN_TYP
        - column: swissNAMES3D_PKT.NAMENGRUPP
        - column: swissNAMES3D_PKT.geometry
        - column: swissBOUNDARIES3D_HOHEITSGEBIET.NAME
          alias: GEMEINDE_NAME
        - column: swissBOUNDARIES3D_HOHEITSGEBIET.BFS_NUMMER
          alias: GEMEINDE_BFS_NUMMER
        - column: swissBOUNDARIES3D_BEZIRKSGEBIET.NAME
          alias: BEZIRK_NAME
        - column: swissBOUNDARIES3D_BEZIRKSGEBIET.BEZIRKSNUM
          alias: BEZIRKSNUM
        - column: swissBOUNDARIES3D_KANTONSGEBIET.NAME
          alias: KANTON_NAME
        - column: swissBOUNDARIES3D_KANTONSGEBIET.KANTONSNUM
          alias: KANTONSNUM
      join:
        - method: left join
          condition:
            type: spatial
            predicate: within
            left:
              column: swissNAMES3D_PKT.geometry
            right:
              column: swissBOUNDARIES3D_HOHEITSGEBIET.geometry
        - method: left join
          condition:
            type: attribute
            predicate: equals
            left:
              column: swissBOUNDARIES3D_HOHEITSGEBIET.BEZIRKSNUM
            right:
              column: swissBOUNDARIES3D_BEZIRKSGEBIET.BEZIRKSNUM
        - method: left join
          condition:
            type: attribute
            predicate: equals
            left:
              column: swissBOUNDARIES3D_BEZIRKSGEBIET.KANTONSNUM
            right:
              column: swissBOUNDARIES3D_KANTONSGEBIET.KANTONSNUM
    features:
      identifier:
        - column: swissNAMES3D_PKT.UUID
      names:
        - column: swissNAMES3D_PKT.NAME
        - column: swissNAMES3D_PKT.NAME_NO_PARENS
        - column: swissNAMES3D_PKT.NAME_NO_CODE

